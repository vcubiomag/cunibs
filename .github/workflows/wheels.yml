name: Build wheels

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build ${{ matrix.python }} wheel
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python:
          - cp312
          - cp313
          - cp314
          - cp314t

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BUILD: ${{ matrix.python }}-manylinux_x86_64
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_ARGS="-DCMAKE_CUDA_ARCHITECTURES=75;80;86;89;90;100;120"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair -w {dest_dir}
            --exclude 'libcudart.so.*'
            --exclude 'libcublas.so.*'
            --exclude 'libcusparse.so.*'
            --exclude 'libcusolver.so.*'
            {wheel}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.python }}-manylinux-x86_64
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      - uses: astral-sh/setup-uv@v8.2.0
      - run: uv build --sdist

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    environment:
      name: pypi
      url: https://pypi.org/p/cunibs
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
